<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jupiter Observation Deck</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #zoomUI {
  z-index: 999999;
}

.a-enter-vr-button {
  z-index: 1 !important;
}
    
  </style> 
</head>
<!--    Zoom -->
 
<body>
 <!-- Zoom Controls -->
<div id="zoomUI" style="
  position: fixed;
  bottom: 30px;
  right: 30px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 99999;
  pointer-events: auto;
">

  <!-- Zoom In -->
  <button id="zoomIn" style="
    width: 44px;
    height: 44px;
    background: rgba(27,27,27,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #ffffff;
    font-size: 26px;
    cursor: pointer;
    border-radius: 6px;
    backdrop-filter: blur(6px);
    line-height: 1;
  ">-</button>

  <!-- Zoom Out -->
  <button id="zoomOut" style="
    width: 44px;
    height: 44px;
    background: rgba(27,27,27,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #ffffff;
    font-size: 26px;
    cursor: pointer;
    border-radius: 6px;
    backdrop-filter: blur(6px);
    line-height: 1;
  ">+</button>

</div>

<a-scene
background="color:#000000"
renderer="antialias:true">

<!-- ASSETS -->

<a-assets>

<img
id="spaceSky"
src="/public/assets/textures/beautiful-view-stars-night-sky.jpg" alt="picture">

<a-asset-item
id="jupiterModel"
src="/public/assets/models/jupiterMove.glb.glb">
</a-asset-item>

<a-asset-item
id="robootModel"
src="/public/assets/models/humanoid_robot_ai.glb">
</a-asset-item>
</a-assets>

<!-- SKY -->

   <a-sphere
    radius="600"
    segments-width="64"
    segments-height="64"
    src="#spaceSky"
    material="side: back; shader: flat"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 300000; easing: linear">
  </a-sphere>
  
<!-- FLOOR -->

<a-plane
position="0 0 -4"
rotation="-90 0 0"
width="30"
height="20"
color="#D9D9D9">
</a-plane>

<!-- CEILING -->

<a-plane
position="0 6 -4"
rotation="90 0 0"
width="30"
height="20"
color="#F5F5F5">
</a-plane>

<!-- LEFT WALL -->

<a-plane
position="-14 3 -4"
rotation="0 90 0"
width="20"
height="6"
color="#EEEEEE">
</a-plane>

<!-- RIGHT WALL -->

<a-plane
position="14 3 -4"
rotation="0 -90 0"
width="20"
height="6"
color="#EEEEEE">
</a-plane>

<!-- BACK WALL -->

<a-plane
position="0 3 5"
rotation="0 180 0"
width="30"
height="6"
color="#F3F3F3">
</a-plane>

<!-- WINDOW FRAME -->

<!-- top -->

<a-box
position="0 5.5 -8"
width="24"
height="0.4"
depth="0.3"
color="#F0F0F0">
</a-box>

<!-- bottom -->

<a-box
position="0 0.1 -8"
width="24"
height="0.4"
depth="0.3"
color="#F0F0F0">
</a-box>

<!-- left -->

<a-box
position="-11.5 2.8 -8"
width="0.4"
height="5"
depth="0.3"
color="#F0F0F0">
</a-box>

<!-- right -->

<a-box
position="11.5 2.8 -8"
width="0.4"
height="5"
depth="0.3"
color="#F0F0F0">
</a-box>

<!-- GLASS -->

<a-plane
position="0 2.8 -7.9"
width="23"
height="5"
color="#CDEFFF"
opacity="0.15"
transparent="true">
</a-plane>

<!-- TOP LED -->

<a-box
position="0 5.35 -7.8"
width="22"
height="0.04"
depth="0.05"
color="#FFFFFF"
emissive="#FFFFFF">
</a-box>

<!-- BOTTOM LED -->

<a-box
position="0 0.25 -7.8"
width="22"
height="0.04"
depth="0.05"
color="#FFFFFF"
emissive="#FFFFFF">
</a-box>

<!-- CONTROL DESK -->

<a-box
position="0 0.5 -5.5"
width="22"
height="0.6"
depth="2"
color="#D0D0D0">
</a-box>

<!-- LEFT CONSOLE -->

<a-box
position="-9 1 -5"
width="2"
height="1"
depth="2"
color="#BBBBBB">
</a-box>

<!-- RIGHT CONSOLE -->

<a-box
position="9 1 -5"
width="2"
height="1"
depth="2"
color="#BBBBBB">
</a-box>

<a-box
  position="0 1 -3"
  width="1"
  height="2"
  depth="1"
  color="red">
</a-box>
<!-- JUPITER -->

<a-entity
id="jupiter"
gltf-model="#jupiterModel"
position="0 2 -80"
scale="0.8 0.8 0.8"
animation="
property:rotation;
to:0 360 0;
dur:120000;
loop:true;
easing:linear">
</a-entity>

<!-- EUROPA -->
 <a-entity
  id="robot"
  gltf-model="#robootModel"
  position="0 1 -2"
  scale="2 2 2">
</a-entity>


<a-sphere
position="5 2 -98"
radius="0.3"
color="#DDDDDD">
</a-sphere>

<!-- CAMERA -->

 <a-entity
  id="camRig"
  position="0 2 -2.5">

 

<a-camera
fov="80">
</a-camera>

</a-entity>

<!-- LIGHTING -->
  <a-light type="ambient"
  color="#111122"
  intensity="0.4">
</a-light>
<a-light type="directional"
  color="#FFF5E0"
  intensity="2"
  position="-3 2 5">
</a-light>
 
 
<a-light type="directional" color="#334455" intensity="0.5" position="5 0 3"></a-light>
 
  <a-light type="point" position="0 5.5 -2" color="#FFFDF0" intensity="1.2" distance="14"></a-light>

  
  <a-light type="point" position="0 3 -7" color="#AADDFF" intensity="0.15" distance="8"></a-light>

</a-scene>
  <script>
   const camRig = document.querySelector('#camRig');
    const MAX_ANGLE = 20;
    let targetY = 0;

    // mouse move listener to set target rotation based on horizontal position
    document.addEventListener('mousemove', (e) => {
      const ratio = (e.clientX / window.innerWidth - 0.5) * 2;
      targetY = -ratio * MAX_ANGLE;
    });

    // the animation loop to smoothly rotate the camera rig
    function animate() {
      const cam = camRig.object3D;
      const targetRad = THREE.MathUtils.degToRad(targetY);
      cam.rotation.y += (targetRad - cam.rotation.y) * 0.04;
      requestAnimationFrame(animate);
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      animate();
    });

 

 //Zoom functionality
let jupiterZ = -80;

function zoomJupiter(direction) {
  const jupiter = document.querySelector('#jupiter');
  jupiterZ += direction > 0 ? -10 : 10;
  jupiterZ = Math.max(-160, Math.min(-40, jupiterZ));
  jupiter.setAttribute('position', `0 2 ${jupiterZ}`);
}

document.getElementById('zoomIn').addEventListener('click', () => zoomJupiter(1));
document.getElementById('zoomOut').addEventListener('click', () => zoomJupiter(-1));

// Zoom  mouse wheel
document.addEventListener('wheel', (e) => {
  zoomJupiter(e.deltaY > 0 ? -1 : 1);
});
  </script>
</body>
</html>
