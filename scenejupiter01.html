<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jupiter Observation Deck</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

 

  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #zoomUI {
  z-index: 999999;
}

.a-enter-vr-button {
  z-index: 1 !important;
}

<!--    Zoom -->
 
<body>
 <!-- Zoom Controls -->
<div id="zoomUI" style="
  position: fixed;
  bottom: 30px;
  right: 30px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 99999;
  pointer-events: auto;
">

  <!-- Zoom In -->
  <button id="zoomIn" style="
    width: 44px;
    height: 44px;
    background: rgba(27,27,27,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #ffffff;
    font-size: 26px;
    cursor: pointer;
    border-radius: 6px;
    backdrop-filter: blur(6px);
    line-height: 1;
  ">-</button>

  <!-- Zoom Out -->
  <button id="zoomOut" style="
    width: 44px;
    height: 44px;
    background: rgba(27,27,27,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: #ffffff;
    font-size: 26px;
    cursor: pointer;
    border-radius: 6px;
    backdrop-filter: blur(6px);
    line-height: 1;
  ">+</button>

</div>

<button id="learnMoreBtn">
 Talk With HAL
</button>

<!-- Popup بعد HAL -->
<div id="hal-popup" style="
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.92);
  border: 1px solid rgba(255,0,0,0.4);
  border-left: 3px solid #FF0000;
  padding: 32px 40px;
  z-index: 99999;
  text-align: center;
  font-family: 'Courier New', monospace;
  min-width: 380px;
">
  <div style="color:#FF0000; font-size:11px; letter-spacing:0.3em; margin-bottom:12px;">HAL 9000</div>
  <div style="color:#ffffff; font-size:15px; line-height:1.8; margin-bottom:24px;">
    Would you like to continue the conversation?<br>
    <span style="color:rgba(255,255,255,0.5); font-size:12px;">Enter the HAL interface room</span>
  </div>
  <button id="enterHAL" style="
    background: rgba(255,0,0,0.15);
    border: 1px solid rgba(255,0,0,0.5);
    color: #FF0000;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    padding: 12px 28px;
    cursor: pointer;
    margin-right: 12px;
  ">ENTER HAL ROOM</button>
  <button id="closePopup" style="
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    padding: 12px 28px;
    cursor: pointer;
  ">STAY</button>
</div>

<!-- Overlay خلف الـ Popup -->
<div id="hal-overlay" style="
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);

  <script>
   const camRig = document.querySelector('#camRig');
    const MAX_ANGLE = 20;
    let targetY = 0;

    // mouse move listener to set target rotation based on horizontal position
    document.addEventListener('mousemove', (e) => {
      const ratio = (e.clientX / window.innerWidth - 0.5) * 2;
      targetY = -ratio * MAX_ANGLE;
    });

    // the animation loop to smoothly rotate the camera rig
    function animate() {
      const cam = camRig.object3D;
      const targetRad = THREE.MathUtils.degToRad(targetY);
      cam.rotation.y += (targetRad - cam.rotation.y) * 0.04;
      requestAnimationFrame(animate);
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      animate();
    });

 

 //Zoom functionality
let jupiterZ = -80;

function zoomJupiter(direction) {
  const jupiter = document.querySelector('#jupiter');
  jupiterZ += direction > 0 ? -10 : 10;
  jupiterZ = Math.max(-160, Math.min(-40, jupiterZ));
  jupiter.setAttribute('position', `0 2 ${jupiterZ}`);
}

document.getElementById('zoomIn').addEventListener('click', () => zoomJupiter(1));
document.getElementById('zoomOut').addEventListener('click', () => zoomJupiter(-1));

// Zoom  mouse wheel
document.addEventListener('wheel', (e) => {
  zoomJupiter(e.deltaY > 0 ? -1 : 1);
});

 
let halHasSpoken = false;

function speakHAL(text) {

    const eye = document.querySelector("#hal-eye");
    const glow = document.querySelector("#hal-glow");

    // Wake up HAL

    if (eye) {

        eye.setAttribute("color", "#FF3333");

        eye.setAttribute(
            "animation",
            "property: scale; from: 1 1 1; to: 2 1.25 1.25; dir: alternate; loop: true; dur: 250"
        );

    }

    if (glow) {

        glow.setAttribute(
            "animation",
            "property: scale; from: 1 1 1; to: 1.8 1.8 1.8; dir: alternate; loop: true; dur: 250"
        );

        glow.setAttribute("opacity", "0.25");
    }

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";
    speech.rate = 0.75;
    speech.pitch = 0.55;
    speech.volume = 1;

    speech.onend = () => {

        if (eye) {

            eye.removeAttribute("animation");

            eye.object3D.scale.set(1,1,1);

            eye.setAttribute("color", "red");
        }

        if (glow) {

            glow.removeAttribute("animation");

            glow.object3D.scale.set(1,1,1);

            glow.setAttribute("opacity", "0.19");
        }

    };

    speechSynthesis.speak(speech);
}

function checkHAL() {

    if (halHasSpoken) {

        requestAnimationFrame(checkHAL);
        return;

    }

    const camRig = document.querySelector('#camRig');

    if (!camRig) {

        requestAnimationFrame(checkHAL);
        return;

    }

    const angle =
        THREE.MathUtils.radToDeg(
            camRig.object3D.rotation.y
        );

    /*
      HAL is on the right side.
      Adjust this value if needed.
    */

    if  (angle < -18 || angle > 22) {

        halHasSpoken = true;

        speakHAL(
            " Good morning, Dr. Bowman.Jupiter is now forty-one hours away. The giant world before you is the largest planet in our Solar System, a vast sphere of hydrogen and helium whose storms have raged for centuries. The Great Red Spot visible from here is a storm larger than Earth itself, and beneath the clouds lie mysteries that humanity is only beginning to understand. Would you like to learn more about Jupiter? you can write any question you have about Jupiter, and I will do my best to answer it. "
        );

    }

    requestAnimationFrame(checkHAL);
}

window.addEventListener("load", () => {

    setTimeout(() => {

        checkHAL();

    }, 1000);

});

 // إغلاق الـ Popup
document.getElementById('closePopup').addEventListener('click', () => {
  document.getElementById('hal-popup').style.display = 'none';
  document.getElementById('hal-overlay').style.display = 'none';
});

// الانتقال لغرفة HAL
document.getElementById('enterHAL').addEventListener('click', () => {
  window.location.href = '/hal-room.html';
});
 

 
 
  </script>
