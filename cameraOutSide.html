<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>Jupiter Observation Deck</title>

<!-- ── SOURCES ──────────────────────────────────────────────────────────────
  webxr-polyfill   CDN   Patches WebXR API on headsets/browsers that need it.
                         Must load before A-Frame so it intercepts the API first.
  aframe           CDN   Core VR framework – scene graph, WebXR, built-in comps.
  navigation.js    local Arrow-key + VR controller locomotion with room bounds.
  cameraOutSide.js local Scene systems (space-audio, outside view logic).
  inlineHal.js     local Inline HAL 9000 dialogue HUD.
  ──────────────────────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@2.0.3/build/webxr-polyfill.min.js"></script>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script type="module" src="/src/navigation.js"></script>
<script type="module" src="/src/systems/cameraOutSide.js"></script>
<script type="module" src="/src/systems/inlineHal.js"></script>
<link rel="stylesheet" href="./style/cameraOutSide.css">
<link rel="stylesheet" href="/style/sound-control.css" />
<link rel="stylesheet" href="/style/sound-zoom-Bg.css" />
</head>
<body>

 <button id="learnMoreBtn">Talk With HAL</button>

<!-- Inline HAL popup + overlay -->
<div id="hal-popup">
  <div class="hal-label">HAL 9000</div>
  <div class="hal-message">Would you like to continue the conversation?<br><span>Use the inline HAL panel</span></div>
  <button id="enterHAL">OPEN HAL PANEL</button>
  <button id="closePopup">STAY</button>
</div>
<div id="hal-overlay"></div>

<!-- HAL interface HUD (keyboard + dialogue) -->
<div id="hal-interface" style="display:none; position:fixed; right:18px; bottom:18px; z-index:999999; width:360px;">
  <div id="hal-loading" style="display:none; font-family:'Courier New', monospace; color:#fff; background:rgba(0,0,0,0.6); padding:8px; border-radius:4px;">HAL IS PROCESSING ...</div>
  <div id="hal-dialogue" style="display:none; background:rgba(10,10,12,0.85); color:#e6f3ff; padding:12px; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.6);">
    <div id="hal-name" style="font-family:'Courier New', monospace; font-size:13px; margin-bottom:6px; color:#88aacc">HAL 9000 — DISCOVERY ONE</div>
    <div id="hal-text" style="font-family:Arial,Helvetica,sans-serif; font-size:14px; line-height:1.3;"></div>
  </div>
  <!-- HUD dialogue only; quick-ask bar below is the active input area -->
</div>

<!-- Persistent quick-ask bar -->
<div id="quick-ask" style="position:fixed; right:18px; bottom:90px; z-index:100000; width:320px; display:flex; gap:8px; background:rgba(8,12,18,0.78); padding:8px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.6); align-items:center;">
  <input id="quick-question" placeholder="Quick ask HAL about Jupiter" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#fff;font-family:inherit;">
  <button id="quick-ask-btn" style="padding:8px 12px;border-radius:8px;background:#2E6AFF;border:none;color:#fff;cursor:pointer;">Send</button>
</div>

  <a-box position="-0.5 0.28 -2.0"  width="0.07" height="0.56" depth="0.07" color="#2A2A2A" metalness="0.7"></a-box>
  <a-box position="0.5 0.28 -2.0"   width="0.07" height="0.56" depth="0.07" color="#2A2A2A" metalness="0.7"></a-box>
  <!-- armrests -->
  <a-box position="-0.58 0.72 -2.4" width="0.09" height="0.05" depth="0.85" color="#1E1E1E" roughness="0.5" metalness="0.3"></a-box>
  <a-box position="0.58 0.72 -2.4"  width="0.09" height="0.05" depth="0.85" color="#1E1E1E" roughness="0.5" metalness="0.3"></a-box>

  <!-- ══ JUPITER SYSTEM — Jupiter + moons as one unit (scroll zooms all together) ══ -->
  <a-entity id="jupiter-system" position="-3 3.2 -140">
    <a-entity id="jupiter"
      gltf-model="#jupiterModel"
      position="0 0 0"
      scale="2 2 2"
      rotation="3 0 -2"
      animation="property:rotation; to:3 360 -2; dur:120000; loop:true; easing:linear">
    </a-entity>
    <!-- Galilean moons orbit the system centre (Jupiter) -->
    <a-entity animation="property:rotation; to:0 360 0; dur:18000; loop:true; easing:linear">
      <a-sphere position="7 0 0" radius="0.22"
        color="#CC9944" emissive="#885522" emissive-intensity="0.3" roughness="0.8"></a-sphere>
    </a-entity>
    <a-entity animation="property:rotation; to:0 360 0; dur:32000; loop:true; easing:linear">
      <a-sphere position="10 0.5 0" radius="0.18"
        color="#DDEEFF" emissive="#8899AA" emissive-intensity="0.25" roughness="0.3"></a-sphere>
    </a-entity>
    <a-entity animation="property:rotation; to:0 360 0; dur:55000; loop:true; easing:linear">
      <a-sphere position="14 -0.8 0" radius="0.3"
        color="#998877" emissive="#554433" emissive-intensity="0.2" roughness="0.9"></a-sphere>
    </a-entity>
  </a-entity>

 
  <!-- ══ LIGHTING ══════════════════════════════════════════════ -->

  <!-- ambient — daytime brightened -->
  <a-light type="ambient" color="#ffffff" intensity="1.8"></a-light>

  <!-- MAIN ceiling strips — warm white, stronger for day feel -->
  <a-light type="point" position="-1.5 5.3 -3" color="#FFFDF0" intensity="5.2" distance="28" decay="1.0"></a-light>
  <a-light type="point" position="1.5 5.3 -3"  color="#FFFDF0" intensity="5.2" distance="28" decay="1.0"></a-light>

  <!-- Cold space light through window — brighter daylight blend -->
  <a-light type="point" position="0 2.78 -9.5"
    color="#CCE8FF" intensity="12.0" distance="36" decay="1.0"></a-light>

  <!-- Jupiter warm orange glow — subtle -->
  <a-light type="point" position="-2 3.8 -11"
    color="#FF8833" intensity="0.6" distance="8" decay="2"></a-light>

  <!-- Blue rim lights near window sides -->
  <a-light type="point" position="-7 2.5 -9" color="#2244AA" intensity="1.2" distance="8" decay="2"></a-light>
  <a-light type="point" position="7 2.5 -9"  color="#2244AA" intensity="1.2" distance="8" decay="2"></a-light>

  <!-- HAL red glow right wall -->
  <a-light type="point" position="7 3.5 -6"
    color="#FF0000" intensity="1.8" distance="9" decay="2"
    animation="property:intensity;from:1.8;to:0.3;dir:alternate;loop:true;dur:3000;easing:easeInOutSine">
  </a-light>

  <!-- desk monitor fill -->
  <a-light type="point" position="0 1.5 -7.5" color="#003300" intensity="1.5" distance="6" decay="1.5"></a-light>

  <!-- floor reflection fill — very subtle -->
  <a-light type="point" position="0 0.1 -5" color="#111122" intensity="0.5" distance="8" decay="1"></a-light>

  <!-- Jupiter sunlight — strong from upper left -->
  <a-light type="point" position="-60 40 20"
    color="#FFF8E8" intensity="30" distance="500" decay="1"></a-light>
  <!-- secondary fill for Jupiter -->
  <a-light type="point" position="20 10 -30"
    color="#FFE8CC" intensity="10" distance="300" decay="1"></a-light>

  <!-- ══ CAMERA ══ -->
  <!-- Bounds: X stays within room width; Z lets player walk from start (9)
       all the way forward to just inside the window (-9.5). WASD disabled
       so all keyboard movement is bounded through the rig. -->
  <a-entity id="camRig" position="0 1.7 9" rotation="0 0 0"
    arrow-controls="xMin: -9; xMax: 9; zMin: -9.5; zMax: 9.5"
    vr-locomotion="xMin: -9; xMax: 9; zMin: -9.5; zMax: 9.5">
    <a-camera fov="72"
      look-controls="enabled:true; reverseMouseDrag:false"
      wasd-controls="enabled:false">
    </a-camera>
    <a-entity id="leftHand"  laser-controls="hand: left"  raycaster="far: 10; objects: .interactive"></a-entity>
    <a-entity id="rightHand" laser-controls="hand: right" raycaster="far: 10; objects: .interactive"></a-entity>
  </a-entity>

</a-scene>
<script type="module" src="/src/sound-control.js"></script>
<script type="module" src="/src/sound-zoom-Bg.js"></script>
</body>
</html>
