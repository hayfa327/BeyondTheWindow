<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAL 9000 — Interface Room</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script type="module" src="/src/systems/halRoom.js"></script>
  <link rel="stylesheet" href="./style/halRoom.css">
    
   
  
</head>
<body>

<button id="back-btn" onclick="window.location.href='./cameraOutSide.html'">← OBSERVATION DECK</button>

<div id="mission-status">
  <div class="status-label">HAL STATUS</div>
  <div class="status-value red">● ONLINE</div>
  <div style="margin-top:10px">
    <div class="status-label">MISSION CLOCK</div>
    <div class="status-value" id="clock-display">DAY 847</div>
  </div>
</div>

<div id="hal-interface">
  <div id="hal-loading">HAL IS PROCESSING ...</div>
  <div id="hal-dialogue">
    <div id="hal-name">HAL 9000 — DISCOVERY ONE</div>
    <div id="hal-text"></div>
  </div>
  <div id="question-box">
    <input id="question-input" type="text" placeholder="Ask HAL about Jupiter..." maxlength="200" autocomplete="off">
    <button id="ask-btn">ASK HAL</button>
  </div>
</div>

<a-scene
  background="color:#020204"
  renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true">

  <a-assets timeout="15000">
    <a-asset-item id="jupiterModel" src="/public/assets/models/jupiterMove.glb.glb"></a-asset-item>
    <img id="nebulaTex" src="/assets/textures/beautiful-view-stars-night-sky.jpg" crossorigin="anonymous" alt="space sky">
  </a-assets>

  <!-- ══ SKY — two layered spheres ══ -->
  <a-sphere radius="500" segments-width="64" segments-height="64"
    src="#nebulaTex"
    material="side:back; opacity:0.85; transparent:true; shader:flat"
    animation="property:rotation; to:5 360 2; loop:true; dur:150000; easing:linear">
  </a-sphere>
  <a-sphere radius="650" segments-width="64" segments-height="64"
    src="#nebulaTex" rotation="54 0 27"
    material="side:back; opacity:0.28; transparent:true; blending:additive; depthWrite:false; shader:flat"
    animation="property:rotation; to:54 -360 27; loop:true; dur:200000; easing:linear">
  </a-sphere>

  <!--
    ROOM: Width=20, Depth=14, Height=5.5  (matches reference blueprint)
    Camera at Z=0 facing -Z
    Window wall at Z=-12
    Back wall at Z=+2
    HAL RIGHT wall X=+9.9
    DOOR LEFT wall X=-9.9
  -->

  <!-- ══ FLOOR — dark polished composite ══ -->
  <a-plane position="0 0 -5" rotation="-90 0 0" width="20" height="14"
    color="#0A0A0C" roughness="0.08" metalness="0.6"></a-plane>

  <!-- floor diagonal accent lines (like reference) -->
  <a-box position="-4 0.005 -5" rotation="0 0 0" width="0.03" height="0.01" depth="14"
    color="#FF2200" emissive="#FF2200" emissive-intensity="0.4" opacity="0.55" transparent="true"></a-box>
  <a-box position="4 0.005 -5" rotation="0 0 0" width="0.03" height="0.01" depth="14"
    color="#FF2200" emissive="#FF2200" emissive-intensity="0.4" opacity="0.55" transparent="true"></a-box>
  <!-- centre line -->
  <a-box position="0 0.005 -5" width="0.025" height="0.01" depth="14"
    color="#CC1100" emissive="#CC1100" emissive-intensity="0.3" opacity="0.4" transparent="true"></a-box>

  <!-- ══ CEILING ══ -->
  <a-plane position="0 5.5 -5" rotation="90 0 0" width="20" height="14"
    color="#080808" roughness="0.95"></a-plane>

  <!-- ══ WALLS — dark matte metal panels ══ -->
  <!-- left wall base -->
  <a-plane position="-10 2.75 -5" rotation="0 90 0" width="14" height="5.5"
    color="#0E0E10" roughness="0.85"></a-plane>
  <!-- right wall base -->
  <a-plane position="10 2.75 -5" rotation="0 -90 0" width="14" height="5.5"
    color="#0E0E10" roughness="0.85"></a-plane>
  <!-- back wall -->
  <a-plane position="0 2.75 2" rotation="0 180 0" width="20" height="5.5"
    color="#0C0C0E" roughness="0.9"></a-plane>

  <!-- wall panel detail — horizontal seam lines left wall -->
  <a-box position="-9.88 1.8 -5" rotation="0 90 0" width="13.5" height="0.025" depth="0.04"
    color="#1A1A1E" roughness="0.4" metalness="0.6"></a-box>
  <a-box position="-9.88 3.6 -5" rotation="0 90 0" width="13.5" height="0.025" depth="0.04"
    color="#1A1A1E" roughness="0.4" metalness="0.6"></a-box>
  <!-- wall panel detail right wall -->
  <a-box position="9.88 1.8 -5" rotation="0 -90 0" width="13.5" height="0.025" depth="0.04"
    color="#1A1A1E" roughness="0.4" metalness="0.6"></a-box>
  <a-box position="9.88 3.6 -5" rotation="0 -90 0" width="13.5" height="0.025" depth="0.04"
    color="#1A1A1E" roughness="0.4" metalness="0.6"></a-box>
  <!-- back wall seams -->
  <a-box position="0 1.8 1.88" rotation="0 180 0" width="19.5" height="0.025" depth="0.04"
    color="#1A1A1E" roughness="0.4" metalness="0.6"></a-box>
  <a-box position="0 3.6 1.88" rotation="0 180 0" width="19.5" height="0.025" depth="0.04"
    color="#1A1A1E" roughness="0.4" metalness="0.6"></a-box>

  <!-- ══ FRONT WALL — window opening ══ -->
  <!-- left flank -->
  <a-box position="-9.2 2.75 -12" width="1.6" height="5.5" depth="0.3" color="#0C0C0E" roughness="0.85"></a-box>
  <!-- right flank -->
  <a-box position="9.2 2.75 -12"  width="1.6" height="5.5" depth="0.3" color="#0C0C0E" roughness="0.85"></a-box>
  <!-- top strip -->
  <a-box position="0 5.2 -12" width="20" height="0.6" depth="0.3" color="#0C0C0E" roughness="0.9"></a-box>
  <!-- bottom sill -->
  <a-box position="0 0.28 -12" width="20" height="0.56" depth="0.3" color="#0C0C0E" roughness="0.9"></a-box>

  <!-- ══ WINDOW FRAME — dark anodised aluminium, chamfered ══ -->

  <a-box position="0 4.92 -12.15" width="16.8" height="0.28" depth="0.55"
    color="#181818" roughness="0.18" metalness="0.92"></a-box>
  <!-- TOP inner bevel — lighter catch -->
  <a-box position="0 4.79 -11.92" width="16.3" height="0.12" depth="0.18"
    color="#303030" roughness="0.1" metalness="0.98"></a-box>

  <!-- BOTTOM outer bar -->
  <a-box position="0 0.56 -12.15" width="16.8" height="0.28" depth="0.55"
    color="#181818" roughness="0.18" metalness="0.92"></a-box>
  <!-- BOTTOM cold LED strip -->
  <a-box position="0 0.70 -11.93" width="16.2" height="0.055" depth="0.1"

  <!-- LEFT post outer -->

  <!-- LEFT post bevel -->

    color="#181818" roughness="0.18" metalness="0.92"></a-box>
  <!-- RIGHT post bevel -->
  <a-box position="8.09 2.74 -11.92" width="0.1" height="4.18" depth="0.18"

  <!-- CORNER bevels — 45° cuts at all 4 corners -->

  <a-box position="7.92 4.62 -12.15"  rotation="0 0 -45" width="0.35" height="0.35" depth="0.55" color="#181818" metalness="0.92"></a-box>
  <a-box position="-7.92 0.86 -12.15" rotation="0 0 -45" width="0.35" height="0.35" depth="0.55" color="#181818" metalness="0.92"></a-box>
  <a-box position="7.92 0.86 -12.15"  rotation="0 0 45"  width="0.35" height="0.35" depth="0.55" color="#181818" metalness="0.92"></a-box>

  <!-- tube 1 -->
  <a-box position="-1.5 5.45 -5" width="0.28" height="0.04" depth="11.8"
    color="#FFFDF0" emissive="#FFFDF0" emissive-intensity="0.75"></a-box>
  <!-- housing 2 -->
  <a-box position="1.5 5.48 -5" width="0.45" height="0.055" depth="12"
    color="#151515" roughness="0.3" metalness="0.8"></a-box>
  <!-- tube 2 -->
  <a-box position="1.5 5.45 -5" width="0.28" height="0.04" depth="11.8"
    color="#FFFDF0" emissive="#FFFDF0" emissive-intensity="0.75"></a-box>

  <!-- subtle floor glow pools under strips (no cones!) -->
  <a-circle position="-1.5 0.01 -3" rotation="-90 0 0" radius="1.8"

  <a-circle position="1.5 0.01 -3" rotation="-90 0 0" radius="1.8"

  <a-circle position="1.5 0.01 -8" rotation="-90 0 0" radius="2.0"
    color="#FFFBE8" opacity="0.045" transparent="true"
    material="shader:flat; depthWrite:false; blending:additive"></a-circle>

  <!-- ══ LEFT WALL PANEL DETAILS ══ -->
  <a-box position="-9.82 3.8 -4" rotation="0 90 0" width="3.0" height="2.4" depth="0.08"

  <a-box position="-9.76 3.8 -4" rotation="0 90 0" width="2.7" height="2.1" depth="0.055"

  <a-sphere position="-9.74 4.55 -4.0" radius="0.03" color="#00FF44" emissive="#00FF44" emissive-intensity="2.5"

  <!-- ══ DOOR — LEFT WALL ══ -->

  <a-box position="-9.88 2.6 -8.5" rotation="0 90 0"

  <a-box position="-9.76 2.6 -8.5" rotation="0 90 0"

    color="#1A1A1C" roughness="0.4" metalness="0.3"></a-box>

  <a-box position="-9.71 2.6 -8.05" rotation="0 90 0" width="0.04" height="4.3" depth="0.045" color="#252528" metalness="0.7"></a-box>
  <a-box position="-9.71 2.6 -8.95" rotation="0 90 0" width="0.04" height="4.3" depth="0.045" color="#252528" metalness="0.7"></a-box>
  <!-- horizontal seam -->
  <a-box position="-9.71 2.6 -8.5" rotation="0 90 0" width="0.04" height="0.04" depth="2.9" color="#252528" metalness="0.7"></a-box>
  <!-- door top LED blue -->
  <a-box position="-9.71 4.9 -8.5" rotation="0 90 0"
    width="0.03" height="0.03" depth="2.8"
    color="#AADDFF" emissive="#AADDFF" emissive-intensity="0.8"></a-box>
  <!-- door handle -->
  <a-box position="-9.68 2.6 -9.5" rotation="0 90 0"
    width="0.08" height="0.5" depth="0.13"
    color="#3C3C3C" roughness="0.12" metalness="0.98"></a-box>
  <!-- door status light -->
  <a-sphere position="-9.7 4.55 -9.5" radius="0.04"
    color="#00FF44" emissive="#00FF44" emissive-intensity="1.8"
    animation="property:emissive-intensity;from:1.8;to:0.5;dir:alternate;loop:true;dur:4000"></a-sphere>

  <!-- ══ HAL 9000 — RIGHT WALL ══ -->
  <!-- large backdrop -->
  <a-box position="9.88 3.2 -6" rotation="0 -90 0"
    width="5.0" height="4.8" depth="0.22"
    color="#0E0E10" roughness="0.6" metalness="0.25"></a-box>
  <!-- outer silver frame -->
  <a-box position="9.76 3.2 -6" rotation="0 -90 0"
    width="3.2" height="4.5" depth="0.14"
    color="#4A4A4A" roughness="0.1" metalness="0.98"></a-box>
  <!-- inner black body -->
  <a-box position="9.7 3.2 -6" rotation="0 -90 0"
    width="2.95" height="4.25" depth="0.1"
    color="#030303" roughness="0.95"></a-box>
  <!-- top silver trim -->
  <a-box position="9.69 5.1 -6" rotation="0 -90 0"
    width="2.8" height="0.055" depth="0.08"

  <!-- bottom trim -->

  <!-- HAL label bar -->
