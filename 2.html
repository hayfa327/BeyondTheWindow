<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAL 9000 — Interface Room</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* ── BACK BUTTON ── */
    #back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 99999;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #back-btn:hover { border-color: rgba(255,0,0,0.4); color: #FF4444; }

    /* ── MISSION STATUS TOP ── */
    #mission-status {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 99999;
      text-align: right;
      font-family: 'Share Tech Mono', monospace;
    }
    .status-label { font-size: 9px; letter-spacing: 0.3em; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
    .status-value { font-size: 13px; letter-spacing: 0.1em; color: rgba(255,255,255,0.7); }
    .status-value.red { color: #FF3333; }

    /* ── HAL INTERFACE PANEL ── */
    #hal-interface {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      max-width: 96vw;
      z-index: 99999;
      padding-bottom: 20px;
    }

    /* dialogue box */
    #hal-dialogue {
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(255,30,30,0.25);
      border-left: 3px solid #FF2200;
      padding: 18px 22px;
      margin-bottom: 10px;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:translateY(0); } }

    #hal-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: #FF2200;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,34,0,0.5);
    }

    #hal-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: rgba(255,255,255,0.88);
      line-height: 1.75;
    }

    /* input row */
    #question-box {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(255,255,255,0.1);
    }

    #question-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      padding: 14px 18px;
    }
    #question-input::placeholder { color: rgba(255,255,255,0.22); }

    #ask-btn {
      background: rgba(255,34,0,0.12);
      border: none;
      border-left: 1px solid rgba(255,34,0,0.3);
      color: #FF3311;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 14px 24px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #ask-btn:hover:not(:disabled) { background: rgba(255,34,0,0.22); }
    #ask-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* loading */
    #hal-loading {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,34,0,0.55);
      text-align: center;
      padding: 8px;
      display: none;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* cursor dot */
    #cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
      z-index: 99998;
    }
  </style>
</head>
<body>

<!-- back -->
<button id="back-btn" onclick="window.location.href='./3.html'">← OBSERVATION DECK</button>

<!-- mission status -->
<div id="mission-status">
  <div class="status-label">HAL STATUS</div>
  <div class="status-value red" id="hal-status-text">● ONLINE</div>
  <div style="margin-top:10px;">
    <div class="status-label">MISSION CLOCK</div>
    <div class="status-value" id="clock-display">DAY 847</div>
  </div>
</div>

<!-- cursor -->
<div id="cursor-dot"></div>

<!-- HAL interface -->
<div id="hal-interface">
  <div id="hal-loading">HAL IS PROCESSING ...</div>
  <div id="hal-dialogue">
    <div id="hal-name">HAL 9000 — DISCOVERY ONE</div>
    <div id="hal-text"></div>
  </div>
  <div id="question-box">
    <input id="question-input" type="text" placeholder="Ask HAL about Jupiter..." maxlength="200" autocomplete="off">
    <button id="ask-btn">ASK HAL</button>
  </div>
</div>

  <!-- dial -->

<script>
  // ── CLOCK ───────────────────────────────
  let seconds = 0;
  setInterval(() => {
    seconds++;
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('clock-display').textContent =
      `DAY 847 — ${pad(h)}:${pad(m)}:${pad(s)}`;
  }, 1000);

  // ── MOUSE LOOK — limited ─────────────────
  const camRig = document.querySelector('#cam-rig');
  const MAX_ANGLE = 22;
  let targetY = 0;

  document.addEventListener('mousemove', (e) => {
    const ratio = (e.clientX / window.innerWidth - 0.5) * 2;
    targetY = -ratio * MAX_ANGLE;
  });

  function animateCam() {
    if (camRig && camRig.object3D) {
      const targetRad = THREE.MathUtils.degToRad(targetY);
      camRig.object3D.rotation.y += (targetRad - camRig.object3D.rotation.y) * 0.04;
    }
    requestAnimationFrame(animateCam);
  }

  document.querySelector('a-scene').addEventListener('loaded', () => {
    animateCam();
    // welcome message
    setTimeout(() => {
      showHALDialogue("Dr. Bowman. I am ready to assist you. You may ask me anything about Jupiter, its moons, or our mission. I will answer as precisely as I can.");
      speakHAL("Good morning, Dr. Bowman. I am ready to assist you. You may ask me anything about Jupiter, its moons, or our mission. I will answer as precisely as I can.");
    }, 1800);
  });

  // ── HAL TYPEWRITER ───────────────────────
  function showHALDialogue(text) {
    const dialogue = document.getElementById('hal-dialogue');
    const textEl = document.getElementById('hal-text');
    dialogue.style.display = 'block';
    textEl.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      textEl.textContent += text[i];
      i++;
      if (i >= text.length) clearInterval(interval);
    }, 32);
  }

  // ── HAL SPEAK ────────────────────────────
  function speakHAL(text) {
    const eye = document.querySelector('#hal-eye');
    if (eye) {
      eye.setAttribute('animation',
        'property: emissive-intensity; from: 3; to: 1; dir: alternate; loop: true; dur: 280; easing: easeInOutSine');
    }
    speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    speech.rate = 0.72;
    speech.pitch = 0.5;
    speech.volume = 1;
    speech.onend = () => {
      if (eye) {
        eye.setAttribute('animation',
          'property: emissive-intensity; from: 2; to: 0.5; dir: alternate; loop: true; dur: 3000; easing: easeInOutSine');
      }
    };
    speechSynthesis.speak(speech);
  }

  // ── HAL SYSTEM PROMPT ────────────────────
  const HAL_SYSTEM = `You are HAL 9000, the artificial intelligence aboard the Discovery One spacecraft on a mission to Jupiter. Your voice is calm, precise, and measured. You never rush. You pause before important statements.

WHAT YOU ANSWER:
- Jupiter: atmosphere, size, storms, Great Red Spot, cloud bands, magnetic field, temperature, composition, lightning
- Jupiter's moons: Europa, Io, Ganymede, Callisto — their surfaces, oceans, orbits
- Mission data: distance, orbital mechanics, arrival time, TMA-2 signal
- Space science directly related to Jupiter or this mission

WHAT YOU DECLINE — respond with exactly:
"I'm sorry, Dr. Bowman. That falls outside my mission information scope. Is there something about Jupiter I can help you understand?"

VOICE RULES:
- Never use exclamation marks
- Never say "Certainly!" or "Of course!" or "Great question!"
- Maximum 4 sentences per response
- Speak in complete, precise sentences
- Occasionally pause mid-thought with a new paragraph`;

  // ── ASK HAL (Claude API) ─────────────────
  async function askHAL(question) {
    const askBtn = document.getElementById('ask-btn');
    const loading = document.getElementById('hal-loading');

    askBtn.disabled = true;
    loading.style.display = 'block';
    document.getElementById('hal-dialogue').style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: HAL_SYSTEM,
          messages: [{ role: 'user', content: question }]
        })
      });

      const data = await response.json();
      const answer = data.content[0].text;

      loading.style.display = 'none';
      showHALDialogue(answer);
      speakHAL(answer);

    } catch (err) {
      loading.style.display = 'none';
      showHALDialogue("I'm sorry. I am experiencing a communication error. Please try again, Dr. Bowman.");
    } finally {
      askBtn.disabled = false;
    }
  }

  // ── INPUT EVENTS ─────────────────────────
  document.getElementById('ask-btn').addEventListener('click', () => {
    const q = document.getElementById('question-input').value.trim();
    if (!q) return;
    askHAL(q);
    document.getElementById('question-input').value = '';
  });

  document.getElementById('question-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      if (!q) return;
      askHAL(q);
      e.target.value = '';
    }
  });
</script>
