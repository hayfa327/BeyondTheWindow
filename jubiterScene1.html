<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond the Window</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Team components: planet-rotation, moon-orbit, space-audio -->
    <script type="module" src="/src/celestial.js"></script>

    <!-- Robot AI -->
    
    <script type="module" src="/src/scenes.js"></script>

  </head>
  <body>

    <a-scene
      space-audio
      background="color: #000005"
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    >

      <!-- ── ASSETS ─────────────────────────────────────────────────────── -->
      <a-assets>
        
<a-asset-item id="jupiterModel" src="/public/assets/models/jupiterMove.glb.glb"></a-asset-item>
 <img id="nebulaTex" src="/assets/textures/beautiful-view-stars-night-sky.jpg" crossorigin="anonymous" alt="Beautiful view of stars and night sky" />
 
      </a-assets>

      

      <!-- ── LIGHTING ───────────────────────────────────────────────────── -->
 <a-light type="ambient"
  color="#111122"
  intensity="0.4">
</a-light>

<a-light type="directional"
  color="#FFF5E0"
  intensity="2"
  position="-3 2 5">
</a-light>
 
 
 

<!-- ── خلفية الفضاء ── -->
<a-sphere
  radius="600"
  segments-width="64"
  segments-height="64"
  src="#nebulaTex"
  material="side: back; shader: flat">
</a-sphere>

<!-- ══ غرفة المحطة ══════════════════════════ -->

<!-- أرضية -->
<a-plane
  position="0 0 -2"
  rotation="-90 0 0"
  width="16" height="10"
  color="#D8D8D8"
  roughness="0.7">
</a-plane>

<!-- سقف -->
<a-plane
  position="0 4 -2"
  rotation="90 0 0"
  width="16" height="10"
  color="#F0F0F0"
  roughness="0.9">
</a-plane>

<!-- جدار خلفي -->
<a-plane
  position="0 2 3"
  rotation="0 180 0"
  width="16" height="4"
  color="#F0F0F0"
  roughness="0.9">
</a-plane>

<!-- جدار أيسر -->
<a-plane
  position="-8 2 -2"
  rotation="0 90 0"
  width="10" height="4"
  color="#EEEEEE"
  roughness="0.9">
</a-plane>

<!-- جدار أيمن -->
<a-plane
  position="8 2 -2"
  rotation="0 -90 0"
  width="10" height="4"
  color="#EEEEEE"
  roughness="0.9">
</a-plane>

<!-- ══ الجدار الأمامي مع النافذة ══════════ -->

<!-- فوق النافذة -->
<a-plane
  position="0 3.6 -8"
  width="16" height="0.8"
  color="#F0F0F0"
  roughness="0.9">
</a-plane>

<!-- تحت النافذة -->
<a-plane
  position="0 0.3 -8"
  width="16" height="0.6"
  color="#F0F0F0"
  roughness="0.9">
</a-plane>

<!-- يسار النافذة -->
<a-plane
  position="-7.2 2 -8"
  width="1.6" height="4"
  color="#F0F0F0"
  roughness="0.9">
</a-plane>

<!-- يمين النافذة -->
<a-plane
  position="7.2 2 -8"
  width="1.6" height="4"
  color="#F0F0F0"
  roughness="0.9">
</a-plane>

<!-- ══ إطار النافذة الأبيض السميك ══════════ -->

<!-- إطار علوي -->
<a-box position="0 3.2 -8"     width="13.5" height="0.5" depth="0.6" color="#E8E8E8" roughness="0.3" metalness="0.4"></a-box>
<!-- إطار سفلي -->
<a-box position="0 0.7 -8"     width="13.5" height="0.5" depth="0.6" color="#E8E8E8" roughness="0.3" metalness="0.4"></a-box>
<!-- إطار أيسر -->
<a-box position="-6.5 2 -8"   width="0.5" height="3" depth="0.6"   color="#E8E8E8" roughness="0.3" metalness="0.4"></a-box>
<!-- إطار أيمن -->
<a-box position="6.5 2 -8"    width="0.5" height="3" depth="0.6"   color="#E8E8E8" roughness="0.3" metalness="0.4"></a-box>

<!-- ══ خط ضوء أبيض على الإطار ══════════════ -->
<a-box position="0 3.15 -7.6"    width="13" height="0.06" depth="0.1" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="1.2"></a-box>
<a-box position="0 0.75 -7.6"    width="13" height="0.06" depth="0.1" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="1.2"></a-box>
<a-box position="-6.45 2 -7.6"  width="0.06" height="2.8" depth="0.1" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="1.2"></a-box>
<a-box position="6.45 2 -7.6"   width="0.06" height="2.8" depth="0.1" color="#FFFFFF" emissive="#FFFFFF" emissive-intensity="1.2"></a-box>

<!-- ══ زجاج النافذة الشفاف ══════════════════ -->
<a-plane
  position="0 1.95 -7.5"
  width="12.8" height="2.7"
  color="#99CCDD"
  opacity="0.03"
  transparent="true"
  side="double">
</a-plane>

<!-- ══ لوحة التحكم أسفل النافذة ══════════════ -->
<a-box
  position="0 0.5 -6.5"
  width="12" height="0.8" depth="1.5"
  color="#CCCCCC"
  roughness="0.5"
  metalness="0.3">
</a-box>

<!-- شاشة لوحة التحكم -->
<a-plane
  position="0 0.92 -6.0"
  rotation="-20 0 0"
  width="10" height="0.5"
  color="#001100"
  emissive="#003300"
  emissive-intensity="0.5">
</a-plane>

<!-- نصوص على الشاشة -->
<a-text
  position="0 0.95 -5.9"
  rotation="-20 0 0"
  value="SYSTEMS: NOMINAL  |  O2: 98%  |  DIST: 627M KM"
  color="#00FF44"
  width="8"
  align="center">
</a-text>

<!-- لوحات جانبية يسار -->
<a-box position="-6.5 1.5 -5" width="2" height="2" depth="0.2" color="#DDDDDD" roughness="0.5"></a-box>
<a-plane position="-6.4 1.5 -4.9" width="1.6" height="1.6" color="#001100" emissive="#002200" emissive-intensity="0.4"></a-plane>

<!-- لوحات جانبية يمين -->
<a-box position="6.5 1.5 -5" width="2" height="2" depth="0.2" color="#DDDDDD" roughness="0.5"></a-box>
<a-plane position="6.4 1.5 -4.9" width="1.6" height="1.6" color="#001100" emissive="#002200" emissive-intensity="0.4"></a-plane>

<!-- ══ المشتري ════════════════════════════════ -->
<a-entity
  id="jupiter"
  gltf-model="#jupiterModel"
  position="0 2 -120"
  scale="0.6 0.6 0.6"
  animation="property: rotation; to: 0 360 0; loop: true; dur: 120000; easing: linear">
</a-entity>

<!-- أوروبا — يسار المشتري -->
<a-sphere
  position="-4 2 -118"
  radius="0.3"
  color="#DDDDCC"
  emissive="#AAAAAA"
  emissive-intensity="0.5">
</a-sphere>

<!-- إيو — يمين المشتري -->
<a-sphere
  position="5 2 -118"
  radius="0.25"
  color="#FF8800"
  emissive="#FF6600"
  emissive-intensity="0.5">
</a-sphere>

<!-- ══ إضاءة الغرفة ══════════════════════════ -->
<a-light type="ambient"     color="#E8E8E8" intensity="0.6"></a-light>
<a-light type="point"       position="0 3.8 -1" color="#FFFDF0" intensity="1" distance="12"></a-light>
<a-light type="directional" color="#FFF5E0" intensity="1" position="-3 2 5"></a-light>
<a-light type="point"       position="0 2 -7" color="#D4956A" intensity="0.2" distance="8"></a-light>

<!-- ══ الكاميرا ══════════════════════════════ -->
<a-entity position="0 1.6 0">
  <a-camera
    wasd-controls="acceleration: 20"
    look-controls="pointerLockEnabled: false"
    fov="75">
  </a-camera>
</a-entity>

 


 

  </body>
</html>
