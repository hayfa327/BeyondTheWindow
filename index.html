<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond the Window</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* ── SOUND BUTTON ───────────────────────────────────────────────── */
      #sound-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 1px solid rgba(80, 160, 255, 0.45);
        background: rgba(5, 10, 35, 0.82);
        color: #a8d4ff;
        font-size: 1.35rem;
        cursor: pointer;
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, border-color 0.2s, transform 0.15s;
        box-shadow: 0 0 16px rgba(40, 100, 255, 0.2);
      }
      #sound-btn:hover {
        background: rgba(20, 50, 120, 0.92);
        border-color: rgba(80, 160, 255, 0.8);
        transform: scale(1.1);
      }
      #sound-btn.muted {
        color: #4a6a88;
        border-color: rgba(80, 160, 255, 0.18);
        box-shadow: none;
      }
    </style>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Team components: planet-rotation, moon-orbit, space-audio -->
    <script type="module" src="/src/celestial.js"></script>

    <!-- Robot AI -->
    <script type="module" src="/src/robot-ai.js"></script>

  </head>
  <body>

    <!-- Sound toggle button — top right corner -->
    <button id="sound-btn" title="Toggle sound">🔊</button>

    <a-scene
      space-audio
      background="color: #000005"
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    >

      <!-- ── ASSETS ─────────────────────────────────────────────────────── -->
      <a-assets>
        <img id="nebulaTex" src="/assets/textures/beautiful-view-stars-night-sky.jpg" crossorigin="anonymous" />

        <!-- Add your models here -->
        <!-- <a-asset-item id="robotModel" src="/assets/models/robot.glb"></a-asset-item> -->
      </a-assets>

      <!-- ── SPACE BACKGROUND — image wrapped on inside of two rotating spheres ── -->

      <!-- Sphere 1: main nebula wrap, rotates slowly -->
      <a-sphere
        id="nebula1"
        radius="600"
        segments-width="64"
        segments-height="64"
        src="#nebulaTex"
        material="side: back; opacity: 0.75; transparent: true; blending: additive; depthWrite: false; shader: flat"
        animation="property: rotation; to: 5 360 2; loop: true; dur: 120000; easing: linear"
      ></a-sphere>

      <!-- Sphere 2: same image, tilted + opposite rotation = parallax depth -->
      <a-sphere
        id="nebula2"
        radius="750"
        segments-width="64"
        segments-height="64"
        src="#nebulaTex"
        rotation="54 0 27"
        material="side: back; opacity: 0.35; transparent: true; blending: additive; depthWrite: false; shader: flat"
        animation="property: rotation; to: 54 -360 27; loop: true; dur: 180000; easing: linear"
      ></a-sphere>

      <!-- ── LIGHTING ───────────────────────────────────────────────────── -->
      <a-light type="ambient"      color="#0d1a3a" intensity="2"></a-light>
      <a-light type="directional"  color="#c8d8ff" intensity="3"  position="5 8 4"></a-light>
      <a-light type="directional"  color="#6633cc" intensity="1.5" position="-4 -2 -6"></a-light>
      <a-light type="point"        color="#0088ff" intensity="1"  position="0 0 0" distance="30"></a-light>

      <!-- ── YOUR MODELS GO HERE ────────────────────────────────────────── -->
      <!-- Example:
      <a-entity
        gltf-model="#robotModel"
        position="0 1.6 -3"
        scale="1 1 1"
        planet-rotation="dur: 20000">
      </a-entity>
      -->

      <!-- ── CAMERA ────────────────────────────────────────────────────── -->
      <a-entity position="0 1.6 0">
        <a-camera
          wasd-controls="acceleration: 20"
          look-controls="pointerLockEnabled: false">
        </a-camera>
      </a-entity>

    </a-scene>

    <script>
      (function () {
        const btn = document.getElementById('sound-btn');
        btn.addEventListener('click', function (e) {
          e.stopPropagation(); // don't let this bubble to the global _startHum listener
          if (!window.__spaceAudio) return;
          const muted = window.__spaceAudio.toggleMute();
          btn.textContent = muted ? '🔇' : '🔊';
          btn.classList.toggle('muted', muted);
        });
      })();
    </script>

  </body>
</html>
