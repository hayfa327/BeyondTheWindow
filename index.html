<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond the Window</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Team components: planet-rotation, moon-orbit, space-audio -->
    <script type="module" src="/src/celestial.js"></script>

    <!-- Robot AI -->
    <script type="module" src="/src/robot-ai.js"></script>
    <script type="module" src="/src/scenes.js"></script>

  </head>
  <body>

    <a-scene
      space-audio
      background="color: #000005"
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    >

      <!-- ── ASSETS ─────────────────────────────────────────────────────── -->
      <a-assets>
        <img id="nebulaTex" src="/assets/textures/beautiful-view-stars-night-sky.jpg" crossorigin="anonymous" alt="Beautiful view of stars and night sky" />
 
        <!-- Add your models here -->
        <!-- <a-asset-item id="robotModel" src="/assets/models/robot.glb"></a-asset-item> -->
      </a-assets>

      <!-- ── SPACE BACKGROUND — image wrapped on inside of two rotating spheres ── -->

      <!-- Sphere 1: main nebula wrap, rotates slowly -->
      <a-sphere
        id="nebula1"
        radius="600"
        segments-width="64"
        segments-height="64"
        src="#nebulaTex"
        material="side: back; opacity: 0.75; transparent: true; blending: additive; depthWrite: false; shader: flat"
        animation="property: rotation; to: 5 360 2; loop: true; dur: 120000; easing: linear"
      ></a-sphere>

      <!-- Sphere 2: same image, tilted + opposite rotation = parallax depth -->
      <a-sphere
        id="nebula2"
        radius="750"
        segments-width="64"
        segments-height="64"
        src="#nebulaTex"
        rotation="54 0 27"
        material="side: back; opacity: 0.35; transparent: true; blending: additive; depthWrite: false; shader: flat"
        animation="property: rotation; to: 54 -360 27; loop: true; dur: 180000; easing: linear"
      ></a-sphere>

      <!-- ── LIGHTING ───────────────────────────────────────────────────── -->
 <a-light type="ambient"
  color="#111122"
  intensity="0.4">
</a-light>


<a-light type="directional"
  color="#FFF5E0"
  intensity="2"
  position="-3 2 5">
</a-light>
 
 <!--    index.html -->
<button onclick="window.location.href='./stationRoom.html'"
  style="position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%); z-index:999;
  background:#ff0000; color:white; border:none;
  padding:12px 24px; font-family:monospace;
  letter-spacing:0.2em; cursor:pointer;">
  ENTER OBSERVATION DECK
</button>
      <!-- ── YOUR MODELS GO HERE ────────────────────────────────────────── -->
 

<!-- the window -->
 
 
      
      <!-- Example:
      <a-entity
        gltf-model="#robotModel"
        position="0 1.6 -3"
        scale="1 1 1"
        planet-rotation="dur: 20000">
      </a-entity>
      -->

      <!-- ── CAMERA ────────────────────────────────────────────────────── -->
      <a-entity position="0 1.6 0">
        <a-camera
          wasd-controls="acceleration: 20"
          look-controls="pointerLockEnabled: false">
        </a-camera>
      </a-entity>

    </a-scene>

  </body>
</html>
