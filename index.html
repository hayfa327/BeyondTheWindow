<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER-9 | Observation Deck</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="./style/hud.css">
</head>
<body>

    <div id="hud">
        <h2>STATION: AETHER-9</h2>
        <div id="ai-comms">
            <p id="ai-status">ASTRONAUT GUIDE: LISTENING... (Say "Moons", "Storm", or "Size")</p>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="station-environment" src="./public/assets/models/station.glb"></a-asset-item>
            <a-asset-item id="astronaut-model" src="./public/assets/models/astronaut.glb"></a-asset-item>
        </a-assets>

        <a-entity gltf-model="#station-environment" position="0 0 0"></a-entity>

        <a-entity id="astronaut-guide" 
                  gltf-model="#astronaut-model"
                  hal-logic 
                  position="1.5 0 -3">
        </a-entity>

        <a-entity id="player" camera look-controls wasd-controls position="0 1.6 0">
            <a-cursor color="#33ff33"></a-cursor>
        </a-entity>

        <a-light type="ambient" color="#666"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="-2 4 3"></a-light>
    </a-scene>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/celestial.js"></script>
    <script type="module" src="./src/robot-ai.js"></script>
    
</body>
</html>
